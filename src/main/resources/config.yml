# EnhancedJobSystem Configuration

# Daily quests: how many free quests each player gets per 24 hours
daily-quests: 3

# Auto Farm harvest interval in minutes (how often the 3x3 auto farm cycles)
auto-farm-harvest-interval: 30

# Money Tree growth time in hours
money-tree-grow-hours: 15

# Vendor NPC IDs (set via /jobadmin setvendor <npc-id>)
# Add Citizens NPC IDs that should act as crop vendors
vendor-npc-ids: []

# Passive XP rates per action (for the Farmer job)
passive-xp:
  harvest-crop: 0.2

# XP required per level (1 through 10)
xp-per-level:
  1: 100
  2: 200
  3: 400
  4: 1000
  5: 2500
  6: 5000
  7: 8000
  8: 12000
  9: 15000
  10: 20000

# Messages (supports & color codes)
messages:
  prefix: "&8[&6Jobs&8] &r"
  job-selected: "&aYou are now working as a &e{job}&a!"
  job-already: "&cYou already have that job!"
  level-up: "&6&lLEVEL UP! &eYour &6{job} &elevel is now &6{level}&e!"
  quest-complete: "&a&lQUEST COMPLETE! &r&aEarned &e{xp} XP&a for your &6{job}&a job!"
  no-quests: "&cYou have no active quests for this job today."
  quests-reset: "&aYour daily quests have been reset!"
  reward-claimed: "&aReward claimed: &e{reward}"
  reward-already-claimed: "&cYou have already claimed this reward."
  not-enough-coins: "&cYou don't have enough gold coins. (Need: {amount})"
  auto-farm-placed: "&aAuto Farm placed! The 3x3 farm will harvest automatically every {interval} minutes."
  money-tree-not-ready: "&cThis Money Tree hasn't fully grown yet. ({time} remaining)"
  no-permission: "&cYou don't have permission to do that."
  player-not-found: "&cPlayer not found."

# Crop sell prices at the vendor NPC (gold coins per item)
crop-prices:
  wheat: 1.0
  carrot: 1.2
  potato: 1.0
  beetroot: 1.5
  pumpkin: 2.0
  melon_slice: 0.5
  melon: 3.0
  sugar_cane: 0.8
  cocoa_beans: 1.5
  nether_wart: 2.0
  sweet_berries: 1.0
  glow_berries: 2.5
  torchflower: 5.0
  pitcher_plant: 5.0
