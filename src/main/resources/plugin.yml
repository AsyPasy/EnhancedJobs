name: EnhancedJobSystem
version: '1.0.0'
main: com.enhancedjobs.EnhancedJobSystem
api-version: '1.20'
description: An enhanced RPG job system with quests, levels, and unique rewards.
authors: [YourName]

softdepend: [Citizens, GoldEconomy]

commands:
  job:
    description: Open your job menu or view job info.
    usage: /job [info|quests|leave <job>]
    permission: enhancedjobs.use
  jobadmin:
    description: Admin commands for the job system.
    usage: /jobadmin <setlevel|setxp|resetquests|setvendor|reload> [player] [args]
    permission: enhancedjobs.admin

permissions:
  enhancedjobs.use:
    description: Allows players to use job commands.
    default: true
  enhancedjobs.admin:
    description: Allows use of admin job commands.
    default: op
